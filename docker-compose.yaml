services:
  db:
    image: postgres:18
    container_name: amr_postgres
    environment:
      POSTGRES_USER: amr_user
      POSTGRES_PASSWORD: amr_password
      POSTGRES_DB: amr_db
    volumes:
      - amr_data:/var/lib/postgresql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    networks:
      - amr-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: amr@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8085:80"
    depends_on:
      - db
    networks:
      - amr-network

  ingest:
    image: ingest_data:v001
    container_name: ingest_pipeline
    depends_on:
      - db
    environment:
      DB_HOST: amr_postgres
      DB_PORT: 5432
      DB_NAME: amr_db
      DB_USER: amr_user
      DB_PASSWORD: amr_password
      GOOGLE_APPLICATION_CREDENTIALS: /home/vscode/.config/gcloud/application_default_credentials.json
      GOOGLE_CLOUD_PROJECT: amr-data-pipeline   
    volumes:
      - /home/vscode/.config/gcloud:/home/vscode/.config/gcloud:ro
    networks:
      - amr-network

  kestra_postgres:
    image: postgres:18
    container_name: kestra_postgres
    volumes:
      - kestra_postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: k3str4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - amr-network

  kestra:
    image: kestra/kestra:v1.1
    container_name: kestra
    pull_policy: always
    user: "root"
    command: server standalone
    depends_on:
      kestra_postgres:
        condition: service_started
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - kestra_data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - kestra_tmp:/tmp/kestra-wd
      - "/home/vscode/.config/gcloud:/home/kestra/.config/gcloud:ro"

    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /home/kestra/.config/gcloud/application_default_credentials.json
      GOOGLE_CLOUD_PROJECT: amr-data-pipeline
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://kestra_postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: k3str4
        kestra:
          server:
            basicAuth:
              username: "admin@kestra.io" # it must be a valid email address
              password: Admin1234!
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: "/app/storage"
          queue:
            type: postgres
          kestra:
          tasks:
          
            tmpDir:
              path: /tmp/kestra-wd/tmp
          url: http://localhost:8080/
    networks:
      - amr-network

volumes:
  amr_data:
  kestra_postgres_data:
  kestra_data:
  kestra_tmp:

networks:
  amr-network:
    driver: bridge